services:
  - type: web
    name: bmk-law
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # את הערך האמיתי מזינים בלוח הבקרה של Render (Environment) — לא כאן.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
